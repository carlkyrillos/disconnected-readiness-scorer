name: Disconnected Readiness Check

# This workflow is designed to run on Pull Requests only
# It analyzes the PR's code for disconnected environment readiness

on:
  workflow_call:
    inputs:
      rules:
        description: "Rules to run (e.g., csv,tags,egress)"
        required: false
        type: string
        default: "csv,tags,egress,python,manifests"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Run disconnected readiness check
        run: |
          git clone --depth 1 https://github.com/opendatahub-io/disconnected-readiness-scorer.git /tmp/scorer
          pip install pyyaml jinja2
          cd /tmp/scorer

          # Run disconnected readiness check
          # Rules will automatically load exceptions from .disconnected-readiness-scorer/exception.yaml in the target repository
          python3 main.py ${{ github.workspace }} --rules ${{ inputs.rules }} --report json

      - name: Store results as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: disconnected-readiness-report
          path: /tmp/scorer/disconnected-report.json
          retention-days: 7

      - name: Comment on PR (on failure)
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Disconnected readiness check failed. Fix the issues before merging." | \
          gh pr comment ${{ github.event.pull_request.number }} --body-file -
